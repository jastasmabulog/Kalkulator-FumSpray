<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Kalkulator Fumigasi dan Spraying</title>
    <link rel="stylesheet" href="login-style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>Welcome Back</h2>
                <p>Please sign in to your account</p>
            </div>

            <form class="login-form" id="loginForm" novalidate>

                <!-- ✅ KANWIL DROPDOWN -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <select id="kanwil" name="kanwil" required>
                            <option value="">Pilih Kanwil</option>
                        </select>
                        <label for="kanwil">Kanwil</label>
                        <span class="input-border"></span>
                    </div>
                    <span class="error-message" id="kanwilError"></span>
                </div>

                <!-- PASSWORD -->
                <div class="form-group">
                    <div class="input-wrapper password-wrapper">
                        <input type="password" id="password" name="password" required>
                        <label for="password">Password</label>
                        <span class="input-border"></span>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <button type="submit" class="login-btn">
                    <span class="btn-text">Sign In</span>
                </button>

                <!-- ERROR MESSAGE GLOBAL -->
                <p id="message" style="color:red; margin-top:10px;"></p>
            </form>

            <div class="success-message" id="successMessage">
                <div class="success-icon">✓</div>
                <h3>Authentication Successful</h3>
                <p>Redirecting to your workspace...</p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>

    <script>
        // redirect kalau sudah login
        window.addEventListener("pageshow", function () {
            const token = localStorage.getItem("token");

            if (token) {
                window.location.replace("index.html");
            }
        });
    </script>
</body>
</html>
